# AI Ops Console — nginx server block
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/
# Then: sudo certbot --nginx -d aiops.madowlab.online
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name aiops.madowlab.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name aiops.madowlab.online;

    # SSL certs (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/aiops.madowlab.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiops.madowlab.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # WebSocket endpoints
    location /ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # REST API + static files + console page
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
